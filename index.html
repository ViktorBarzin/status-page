<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Status — viktorbarzin.me</title>
<style>
:root {
  --bg: #f8f9fa; --bg2: #fff; --fg: #1a1a2e; --fg2: #555;
  --border: #e0e0e0; --green: #2ecc71; --red: #e74c3c; --yellow: #f39c12;
  --green-bg: #d4edda; --red-bg: #f8d7da; --yellow-bg: #fff3cd;
  --bar-bg: #e9ecef; --shadow: rgba(0,0,0,0.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117; --bg2: #161b22; --fg: #e6edf3; --fg2: #8b949e;
    --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --green-bg: #1a2e1a; --red-bg: #2e1a1a; --yellow-bg: #2e2a1a;
    --bar-bg: #21262d; --shadow: rgba(0,0,0,0.3);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); line-height: 1.5; }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
header { text-align: center; margin-bottom: 24px; }
header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
.updated { color: var(--fg2); font-size: 0.85rem; }
.banner { padding: 12px 16px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: 500; }
.banner-ok { background: var(--green-bg); color: var(--green); }
.banner-warn { background: var(--yellow-bg); color: var(--yellow); }
.banner-down { background: var(--red-bg); color: var(--red); }
.stale-warning { background: var(--yellow-bg); color: var(--yellow); padding: 10px 16px; border-radius: 8px; text-align: center; margin-bottom: 16px; font-size: 0.9rem; display: none; }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.controls label { font-size: 0.8rem; color: var(--fg2); }
.controls select { font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--fg); cursor: pointer; }
.filter-btn { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg2); color: var(--fg2); cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--fg2); }
.filter-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.group { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--shadow); overflow: hidden; }
.group.hidden { display: none; }
.group-header { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.group-header:hover { background: var(--bg); }
.group-title { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
.group-summary { font-size: 0.8rem; color: var(--fg2); display: flex; align-items: center; gap: 6px; }
.chevron { transition: transform 0.2s; font-size: 0.75rem; color: var(--fg2); }
.group.collapsed .chevron { transform: rotate(-90deg); }
.group.collapsed .group-body { display: none; }
.group-body { border-top: 1px solid var(--border); }
.uptime-header { display: flex; align-items: center; padding: 6px 16px; gap: 10px; border-bottom: 1px solid var(--border); background: var(--bg); }
.uptime-header-spacer { width: 10px; flex-shrink: 0; }
.uptime-header-name { flex: 1; font-size: 0.7rem; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; }
.uptime-header-labels { display: flex; gap: 6px; font-size: 0.65rem; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.5px; }
.uptime-header-label { width: 52px; text-align: center; }
.monitor { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
.monitor:last-child { border-bottom: none; }
.monitor.hidden { display: none; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-up { background: var(--green); }
.dot-down { background: var(--red); }
.dot-pending { background: var(--yellow); }
.monitor-name { flex: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.uptime-bars { display: flex; gap: 6px; font-size: 0.75rem; color: var(--fg2); }
.uptime-pill { background: var(--bar-bg); padding: 2px 8px; border-radius: 4px; white-space: nowrap; min-width: 52px; text-align: center; }
.uptime-pill.good { color: var(--green); }
.uptime-pill.warn { color: var(--yellow); }
.uptime-pill.bad { color: var(--red); }
footer { text-align: center; color: var(--fg2); font-size: 0.8rem; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
.loading { text-align: center; padding: 60px 0; color: var(--fg2); }
.error-msg { text-align: center; padding: 40px 0; color: var(--red); }
@media (max-width: 500px) {
  .uptime-bars { gap: 4px; }
  .uptime-pill { font-size: 0.7rem; padding: 2px 5px; min-width: 44px; }
  .uptime-header-label { width: 44px; }
  .controls { gap: 6px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Viktor's Services</h1>
    <div class="updated" id="updated"></div>
  </header>
  <div class="stale-warning" id="stale-warning"></div>
  <div class="banner" id="banner"></div>
  <div class="controls" id="controls" style="display:none">
    <label>Show:</label>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="up">Up</button>
    <button class="filter-btn" data-filter="down">Down</button>
    <span style="flex:1"></span>
    <label>Sort:</label>
    <select id="sort-select">
      <option value="status">Status (down first)</option>
      <option value="name">Name (A-Z)</option>
      <option value="uptime-asc">Uptime (worst first)</option>
      <option value="uptime-desc">Uptime (best first)</option>
    </select>
  </div>
  <div id="groups"><div class="loading">Loading status...</div></div>
  <footer>Powered by Uptime Kuma &middot; Updated every 5 minutes</footer>
</div>
<script>
(function() {
  const STATUS_URL = 'status.json';
  const STALE_THRESHOLD_MS = 10 * 60 * 1000;
  var currentData = null;
  var currentFilter = 'all';
  var currentSort = 'status';

  function timeAgo(date) {
    const s = Math.floor((Date.now() - date.getTime()) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }

  function uptimeClass(pct) {
    if (pct === null || pct === undefined) return '';
    if (pct >= 99) return 'good';
    if (pct >= 95) return 'warn';
    return 'bad';
  }

  function fmt(pct) {
    if (pct === null || pct === undefined) return '-';
    return pct.toFixed(1) + '%';
  }

  function sortMonitors(monitors) {
    return monitors.slice().sort(function(a, b) {
      if (currentSort === 'name') return a.name.localeCompare(b.name);
      if (currentSort === 'uptime-asc') {
        var au = a.uptime_24h === null ? 101 : a.uptime_24h;
        var bu = b.uptime_24h === null ? 101 : b.uptime_24h;
        return au - bu;
      }
      if (currentSort === 'uptime-desc') {
        var au2 = a.uptime_24h === null ? -1 : a.uptime_24h;
        var bu2 = b.uptime_24h === null ? -1 : b.uptime_24h;
        return bu2 - au2;
      }
      // default: status (down first)
      var order = { down: 0, pending: 1, up: 2 };
      var ao = order[a.status] !== undefined ? order[a.status] : 1;
      var bo = order[b.status] !== undefined ? order[b.status] : 1;
      if (ao !== bo) return ao - bo;
      return a.name.localeCompare(b.name);
    });
  }

  function filterMatch(m) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'up') return m.status === 'up';
    if (currentFilter === 'down') return m.status !== 'up';
    return true;
  }

  function render(data) {
    currentData = data;
    var updated = new Date(data.last_updated);
    var age = Date.now() - updated.getTime();
    document.getElementById('updated').textContent = 'Last updated ' + timeAgo(updated);

    var stale = document.getElementById('stale-warning');
    if (age > STALE_THRESHOLD_MS) {
      var mins = Math.floor(age / 60000);
      stale.textContent = 'Status data is ' + mins + ' minutes old. The monitoring system may be unreachable.';
      stale.style.display = 'block';
    } else {
      stale.style.display = 'none';
    }

    // Filter out paused monitors from all groups
    var groups = {};
    for (var gName in data.groups) {
      var active = data.groups[gName].filter(function(m) { return m.status !== 'paused'; });
      if (active.length > 0) groups[gName] = active;
    }

    var totalUp = 0, totalDown = 0;
    for (var g in groups) {
      for (var i = 0; i < groups[g].length; i++) {
        if (groups[g][i].status === 'up') totalUp++;
        else totalDown++;
      }
    }

    var banner = document.getElementById('banner');
    if (totalDown === 0) {
      banner.className = 'banner banner-ok';
      banner.textContent = 'All Systems Operational';
    } else if (totalDown <= 3) {
      banner.className = 'banner banner-warn';
      banner.textContent = totalDown + ' service' + (totalDown > 1 ? 's' : '') + ' experiencing issues';
    } else {
      banner.className = 'banner banner-down';
      banner.textContent = totalDown + ' services down';
    }

    document.getElementById('controls').style.display = 'flex';

    var container = document.getElementById('groups');
    container.innerHTML = '';

    var sortedKeys = Object.keys(groups).sort(function(a, b) { return groups[b].length - groups[a].length; });

    for (var ki = 0; ki < sortedKeys.length; ki++) {
      var groupName = sortedKeys[ki];
      var monitors = groups[groupName];
      var sorted = sortMonitors(monitors);

      var visibleCount = sorted.filter(filterMatch).length;

      var group = document.createElement('div');
      group.className = 'group' + (visibleCount === 0 ? ' hidden' : '');

      var up = monitors.filter(function(m) { return m.status === 'up'; }).length;
      var down = monitors.filter(function(m) { return m.status !== 'up'; }).length;

      var hdr = document.createElement('div');
      hdr.className = 'group-header';
      hdr.innerHTML = '<div class="group-title"><span class="chevron">&#9660;</span> ' + groupName + ' <span style="font-weight:400;color:var(--fg2);font-size:0.8rem">(' + monitors.length + ')</span></div>' +
        '<div class="group-summary">' +
        (down > 0 ? '<span style="color:var(--red)">' + down + ' down</span>' : '') +
        '<span style="color:var(--green)">' + up + ' up</span>' +
        '</div>';
      hdr.onclick = function() { this.parentElement.classList.toggle('collapsed'); };

      var body = document.createElement('div');
      body.className = 'group-body';

      // Column header row
      var colHeader = document.createElement('div');
      colHeader.className = 'uptime-header';
      colHeader.innerHTML = '<div class="uptime-header-spacer"></div>' +
        '<div class="uptime-header-name">Service</div>' +
        '<div class="uptime-header-labels">' +
        '<div class="uptime-header-label">24h</div>' +
        '<div class="uptime-header-label">7d</div>' +
        '<div class="uptime-header-label">30d</div>' +
        '</div>';
      body.appendChild(colHeader);

      for (var mi = 0; mi < sorted.length; mi++) {
        var m = sorted[mi];
        var visible = filterMatch(m);
        var dotClass = m.status === 'up' ? 'dot-up' : m.status === 'pending' ? 'dot-pending' : 'dot-down';
        var row = document.createElement('div');
        row.className = 'monitor' + (visible ? '' : ' hidden');
        row.innerHTML = '<div class="dot ' + dotClass + '"></div>' +
          '<div class="monitor-name">' + m.name + '</div>' +
          '<div class="uptime-bars">' +
          '<span class="uptime-pill ' + uptimeClass(m.uptime_24h) + '">' + fmt(m.uptime_24h) + '</span>' +
          '<span class="uptime-pill ' + uptimeClass(m.uptime_7d) + '">' + fmt(m.uptime_7d) + '</span>' +
          '<span class="uptime-pill ' + uptimeClass(m.uptime_30d) + '">' + fmt(m.uptime_30d) + '</span>' +
          '</div>';
        body.appendChild(row);
      }

      group.appendChild(hdr);
      group.appendChild(body);
      container.appendChild(group);
    }
  }

  // Filter buttons
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('filter-btn')) {
      var btns = document.querySelectorAll('.filter-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      e.target.classList.add('active');
      currentFilter = e.target.getAttribute('data-filter');
      if (currentData) render(currentData);
    }
  });

  // Sort select
  document.getElementById('sort-select').addEventListener('change', function() {
    currentSort = this.value;
    if (currentData) render(currentData);
  });

  function load() {
    fetch(STATUS_URL + '?t=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(render)
      .catch(function() {
        document.getElementById('groups').innerHTML = '<div class="error-msg">Could not load status data. The monitoring system may be offline.</div>';
        document.getElementById('banner').className = 'banner banner-down';
        document.getElementById('banner').textContent = 'Status Unavailable';
      });
  }

  load();
  setInterval(load, 60000);
})();
</script>
</body>
</html>
